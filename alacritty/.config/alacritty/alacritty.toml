general.import = [
  # Uncomment the theme you want to use
  # Make sure to update the path to match where you cloned dotfiles
  # Example: If cloned to ~/.dotfiles, use "~/.dotfiles/alacritty/theme.toml"

  # "~/dotfiles/alacritty/catppuccin-mocha.toml", # catppuccin-mocha theme
  # "~/dotfiles/alacritty/moonfly-default.toml",  # moonfly theme
  # "~/dotfiles/alacritty/gruvbox-dark-soft-contrast.toml",  # gruvbox theme
  # "~/dotfiles/alacritty/cyberdream.toml",  # cyberdream theme
  "~/dotfiles/alacritty/tokyo-night.toml", # tokyo-night theme (default)
  # "~/dotfiles/alacritty/chicago95.toml", # tokyo-night theme (default)
]

[env]
TERM = "xterm-256color"
PYTHONWARNINGS = "ignore"
LANG = "en_US.UTF-8"

[cursor.style]
blinking = "On" # values are =['On', 'Off', 'Always','Never']
shape = "Block"

# dir
[font]
size = 14

[font.normal]
# family = "BigBlueTermPlus Nerd Font"
# family = "FiraCode"
family = "JetBrainsMono Nerd Font"
style = "SemiBold"

[terminal]
[terminal.shell]
program = "/bin/zsh"

[window]
decorations = "full"
dynamic_padding = true
# opacity = 0.75
# blur = true
startup_mode = "Windowed"
title = "Alacritty"

[window.padding]
x = 5
y = 5

# Keybindings
[keyboard]
bindings = [{ key = "`", mods = "Control", action = "ToggleFullscreen" }]
